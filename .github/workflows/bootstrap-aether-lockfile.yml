name: Bootstrap AETHER lockfile

on:
  push:
    branches:
      - chore/verify-aether-v0
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bootstrap-aether-lockfile
  cancel-in-progress: false

jobs:
  lockfile:
    name: Generate and validate package-lock.json
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout verification branch
        uses: actions/checkout@v4
        with:
          ref: chore/verify-aether-v0
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate lockfile without running package scripts
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            echo "package-lock.json already exists; no bootstrap mutation required."
            exit 0
          fi
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          test -s package-lock.json

      - name: Validate frozen installation
        if: hashFiles('package-lock.json') != ''
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Commit lockfile only
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- package-lock.json; then
            echo "No lockfile change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git diff --cached --name-only | grep -qx 'package-lock.json'
          git commit -m "build: add verified AETHER lockfile"
          git push origin HEAD:chore/verify-aether-v0
