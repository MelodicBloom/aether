name: AETHER Reproducible Build Evidence

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - src/**
      - public/**
      - tests/webgl-evidence.mjs
      - docs/verification/REPRODUCIBLE_BUILD_EVIDENCE.md
      - .github/workflows/reproducible-build.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package.json

      - name: Create artifact directory
        run: mkdir -p artifacts

      - name: Generate lockfile candidate when absent
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only --ignore-scripts --no-audit --no-fund
            echo "generated_lockfile=true" >> "$GITHUB_ENV"
          else
            echo "generated_lockfile=false" >> "$GITHUB_ENV"
          fi
          sha256sum package.json > artifacts/package-json.sha256
          sha256sum package-lock.json > artifacts/package-lock.sha256
          cp package-lock.json artifacts/package-lock.candidate.json

      - name: Frozen install
        run: npm ci --no-audit --no-fund

      - name: Strict typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Production build A
        run: npm run build

      - name: Record normalized manifest A
        shell: bash
        run: |
          find .next -type f \
            ! -path '.next/cache/*' \
            ! -name 'BUILD_ID' \
            ! -name '*.trace' \
            -print0 \
            | sort -z \
            | xargs -0 sha256sum > artifacts/build-a.sha256

      - name: Clean and production build B
        run: |
          rm -rf .next
          npm run build

      - name: Record normalized manifest B
        shell: bash
        run: |
          find .next -type f \
            ! -path '.next/cache/*' \
            ! -name 'BUILD_ID' \
            ! -name '*.trace' \
            -print0 \
            | sort -z \
            | xargs -0 sha256sum > artifacts/build-b.sha256

      - name: Compare normalized manifests
        run: diff -u artifacts/build-a.sha256 artifacts/build-b.sha256

      - name: Record WebGL evidence inventory
        run: node tests/webgl-evidence.mjs

      - name: Create execution receipt
        if: always()
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const crypto = require('node:crypto');
          const hash = (path) => fs.existsSync(path)
            ? crypto.createHash('sha256').update(fs.readFileSync(path)).digest('hex')
            : null;
          const receipt = {
            schemaVersion: 'aether.reproducible-build.v0.1',
            commit: process.env.GITHUB_SHA,
            generatedAt: new Date().toISOString(),
            generatedLockfile: process.env.generated_lockfile === 'true',
            packageJsonSha256: hash('package.json'),
            packageLockSha256: hash('package-lock.json'),
            manifestASha256: hash('artifacts/build-a.sha256'),
            manifestBSha256: hash('artifacts/build-b.sha256'),
            webglEvidenceSha256: hash('artifacts/webgl-evidence.json'),
            exclusions: ['.next/cache/**', '.next/BUILD_ID', '*.trace'],
          };
          fs.mkdirSync('artifacts', { recursive: true });
          fs.writeFileSync('artifacts/reproducible-build-receipt.json', JSON.stringify(receipt, null, 2) + '\n');
          NODE

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aether-reproducible-build-evidence
          path: artifacts/**
          if-no-files-found: error
          retention-days: 30
