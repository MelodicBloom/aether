name: Defensible Vertical Slice
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  verify:
    uses: MelodicBloom/.github/.github/workflows/reusable-defensible-vertical-slice.yml@597d76aa36c833f8374b1756e4db46244e012323
    with:
      node-version: "20"
      package-manager: npm
      profile-path: .melodicbloom/verification-profile.json
      lint-command: npm run lint
      typecheck-command: npm run typecheck
      build-command: npm run build
      specialized-command: test -s docs/verification/WEBGL_SMOKE_TEST.md && test -s docs/verification/ACCESSIBILITY_CHECKLIST.md
      artifact-path: .next
